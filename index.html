<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padlet Archive Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e2e8f0;
            --card-bg: #ffffff;
            --accent: #4ade80; /* Padlet風のアクセントカラー */
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px; /* 背景にうっすらドットを引いてPadlet感を演出 */
            margin: 0;
            padding: 20px;
            color: var(--text-main);
        }

        header {
            text-align: center;
            padding: 40px 0;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: #0f172a;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* グリッドレイアウト */
        #content {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* カードのスタイルとアニメーション */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            border: 1px solid rgba(255,255,255,0.7);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s forwards;
            position: relative;
            overflow: hidden;
        }

        /* ホバー時のアニメーション */
        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            border-color: var(--accent);
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            background: var(--accent);
            opacity: 0.8;
        }

        .meta {
            font-size: 0.75rem;
            color: var(--text-sub);
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 1.25rem;
            line-height: 1.4;
        }

        .card-body {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #334155;
        }

        /* アニメーション定義 */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* レスポンシブ調整 */
        @media (max-width: 600px) {
            #content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1 id="board-title">Padlet Archive</h1>
</header>

<div id="content"></div>

<script>
    async function loadPadlet() {
        const contentDiv = document.getElementById('content');
        const titleH1 = document.getElementById('board-title');

        try {
            const response = await fetch('padlet_export.md?t=' + Date.now());
            if (!response.ok) throw new Error('File not found');
            const text = await response.text();

            // タイトル抽出
            const titleMatch = text.match(/^# (.*)/);
            if (titleMatch) titleH1.textContent = titleMatch[1];

            // 投稿分割
            const posts = text.split('---');

            posts.forEach((post, index) => {
                const trimmed = post.trim();
                if (!trimmed || trimmed.startsWith('# ')) return;

                const card = document.createElement('div');
                card.className = 'card';
                // 表示に時間差をつけてパラパラと出す
                card.style.animationDelay = `${index * 0.1}s`;

                const lines = trimmed.split('\n');
                let metaHtml = '';
                let bodyMd = '';

                lines.forEach(line => {
                    if (line.startsWith('- **')) {
                        metaHtml += `<span>${line.replace(/[-*]/g, '').trim()}</span>`;
                    } else {
                        bodyMd += line + '\n';
                    }
                });

                card.innerHTML = `
                    <div class="meta">${metaHtml}</div>
                    <div class="card-body">${marked.parse(bodyMd)}</div>
                `;
                contentDiv.appendChild(card);
            });

        } catch (err) {
            titleH1.textContent = "Error";
            contentDiv.innerHTML = `<div class="card">データを読み込めませんでした。GitHub Actionsが完了しているか確認してください。</div>`;
        }
    }

    loadPadlet();
</script>

</body>
</html>
