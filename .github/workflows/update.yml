name: Padlet Auto Sync

on:
  schedule:
    # 1分おきに実行
    - cron: '* * * * *'
  workflow_dispatch: # 手動実行ボタンを有効化

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # 実行が重なった際の衝突を防ぐ
    concurrency:
      group: padlet-sync
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 全履歴を取得してpushエラーを回避

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        run: python update_padlet.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # information.mdが存在するか確認
          if [ -f information.md ]; then
            git add information.md
            # 差分がある場合のみコミット
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "chore: update padlet data [skip ci]"
              # 他のジョブとの競合を防ぐため、最新状態を取り込んでからpush
              git pull --rebase origin main
              git push origin main
            fi
          else
            echo "Error: information.md not found."
            exit 1
          fi
